services:
  owui-coder-proxy:
    build: .
    container_name: owui-coder-proxy
    restart: unless-stopped
    environment:
      - UPSTREAM=${UPSTREAM:-http://open-webui:8080}
    ports:
      - "127.0.0.1:4002:8000"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: ${TRAEFIK_NETWORK:-openwebui_default}
    external: true
