# Traefik-Variante für Setups mit Traefik-Reverse-Proxy.
# Routing: https://${DOMAIN}/coder/v1/...  →  Stripprefix /coder  →  Container :8000
#
# Konfiguration via .env (siehe .env.example):
#   DOMAIN          = deine Open-WebUI-Domain (z.B. example.com)
#   TRAEFIK_NETWORK = der Docker-Netzwerkname, in dem Traefik routet
#   UPSTREAM        = optional, Default http://open-webui:8080

services:
  owui-coder-proxy:
    build: .
    container_name: owui-coder-proxy
    restart: unless-stopped
    environment:
      - UPSTREAM=${UPSTREAM:-http://open-webui:8080}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.owui-coder.rule=Host(`${DOMAIN}`) && PathPrefix(`/coder`)"
      - "traefik.http.routers.owui-coder.entrypoints=https"
      - "traefik.http.routers.owui-coder.tls=true"
      - "traefik.http.routers.owui-coder.middlewares=owui-coder-strip"
      - "traefik.http.middlewares.owui-coder-strip.stripprefix.prefixes=/coder"
      - "traefik.http.services.owui-coder.loadbalancer.server.port=8000"

networks:
  traefik:
    name: ${TRAEFIK_NETWORK}
    external: true
